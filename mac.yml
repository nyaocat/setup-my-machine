---
- name: set up my machine
  hosts: localhost
  connection: local
  tasks:
    - name: install packages
      community.general.homebrew:
        update_homebrew: true
        upgrade_all: true
        name:
          - ansible
          - awscli
          - bash
          - claude-code
          - cmake
          - codex
          - duckdb
          - eza
          - ffmpeg
          - gemini-cli
          - genact
          - gh
          - glow
          - gnu-sed
          - gnu-tar
          - google-japanese-ime
          - grep
          - jq
          - mise
          - moreutils
          - ngrok
          - obsidian
          - peco
          - pkgconf
          - postgresql@16
          - restic
          - slack
          - tig
          - tmux
          - vips
          - visual-studio-code
          - vlc
          - webp
          - zoxide
          - zsh-autosuggestions
          - zsh-completions
          - zsh-syntax-highlighting
          - difftastic
          - ast-grep
          - fd
          - sd
          - scc
          - yq
          - rancher
          - linear

    - name: check pg_bigm.so
      stat:
        path: /opt/homebrew/opt/postgresql@16/lib/postgresql/pg_bigm.dylib
      register: rc_pg_bigm

    - name: install pg_bigm
      when: not rc_pg_bigm.stat.exists
      block:
        - name: prepare temporary directory for pg_bigm build
          ansible.builtin.tempfile:
            state: directory
          register: rc_tempdir

        - name: unarchive pg_bigm
          ansible.builtin.unarchive:
            src: "https://github.com/pgbigm/pg_bigm/archive/refs/tags/v1.2-20250903.tar.gz"
            dest: "{{ rc_tempdir.path }}"
            remote_src: yes

        - name: build pg_bigm
          ansible.builtin.command:
            cmd: "make USE_PGXS=1 PG_CONFIG=/opt/homebrew/opt/postgresql@16/bin/pg_config"
            chdir: "{{ rc_tempdir.path }}/pg_bigm-1.2-20250903"

        - name: install pg_bigm
          ansible.builtin.command:
            cmd: "make USE_PGXS=1 PG_CONFIG=/opt/homebrew/opt/postgresql@16/bin/pg_config install"
            chdir: "{{ rc_tempdir.path }}/pg_bigm-1.2-20250903"

        - name: clean up tmeporary directory
          ansible.builtin.file:
            path: "{{ rc_tempdir.path }}"
            state: absent

    - name: prepare memos directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      loop:
        - ~/.local/bin
        - ~/Library/LaunchAgents
        - ~/Documents/memos

    - name: check installed memos version
      ansible.builtin.slurp:
        src: ~/.local/bin/.memos.version
      register: rc_memos_version
      failed_when: false

    - name: install memos binary
      when: (rc_memos_version.content | default('') | b64decode | trim) != 'v0.28.0'
      vars:
        memos_version: "0.28.0"
        memos_sha256: "2e32bbad88d628ec33c1befa5f29c3f1f4844b3959ab31b6845ce4cefede0e8c"
      block:
        - name: prepare temporary directory for memos download
          ansible.builtin.tempfile:
            state: directory
          register: rc_memos_tempdir

        - name: download memos tarball with checksum verification
          ansible.builtin.get_url:
            url: "https://github.com/usememos/memos/releases/download/v{{ memos_version }}/memos_{{ memos_version }}_darwin_arm64.tar.gz"
            dest: "{{ rc_memos_tempdir.path }}/memos.tar.gz"
            checksum: "sha256:{{ memos_sha256 }}"

        - name: extract memos tarball
          ansible.builtin.unarchive:
            src: "{{ rc_memos_tempdir.path }}/memos.tar.gz"
            dest: "{{ rc_memos_tempdir.path }}"
            remote_src: yes

        - name: install memos binary
          ansible.builtin.copy:
            src: "{{ rc_memos_tempdir.path }}/memos"
            dest: "{{ ansible_env.HOME }}/.local/bin/memos"
            mode: "0755"
            remote_src: yes
          register: rc_memos_install

        - name: write memos version marker
          ansible.builtin.copy:
            content: "v{{ memos_version }}"
            dest: "{{ ansible_env.HOME }}/.local/bin/.memos.version"

        - name: clean up memos temporary directory
          ansible.builtin.file:
            path: "{{ rc_memos_tempdir.path }}"
            state: absent

    - name: deploy memos LaunchAgent plist
      ansible.builtin.template:
        src: assets/mac/com.usememos.memos.plist.j2
        dest: "{{ ansible_env.HOME }}/Library/LaunchAgents/com.usememos.memos.plist"
      register: rc_memos_plist

    - name: reload memos LaunchAgent
      when: rc_memos_plist.changed or (rc_memos_install.changed | default(false))
      ansible.builtin.shell: |
        uid=$(id -u)
        launchctl bootout gui/$uid/com.usememos.memos 2>/dev/null || true
        launchctl bootstrap gui/$uid {{ ansible_env.HOME }}/Library/LaunchAgents/com.usememos.memos.plist

    - name: start postgresql
      community.general.homebrew_services:
        name: postgresql@16
        state: "{{ 'present' if rc_pg_bigm.stat.exists else 'restarted' }}"

    - name: prepare git and mise config directory
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      loop:
        - ~/.config/mise
        - ~/.config/git

    - name: copy files
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
      loop:
        - src: assets/mac/bash_profile
          dest: ~/.bash_profile
        - src: assets/mac/zshrc
          dest: ~/.zshrc
        - src: assets/mac/zprofile
          dest: ~/.zprofile
        - src: assets/tmux.conf
          dest: ~/.tmux.conf
        - src: assets/gitignore
          dest: ~/.config/git/ignore

    - name: copy mise config file
      ansible.builtin.copy:
        src: assets/mise.config.toml
        dest: ~/.config/mise/config.toml
      register: rc_copy_mise_config

    - name: install mise
      ansible.builtin.command:
        cmd: mise install
      when: rc_copy_mise_config.changed

    - name: Clean up downloads directory
      ansible.builtin.shell: "rm -rf ~/Downloads/*"
